<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
  </head>
  <body>
    <div
      class="flex min-h-screen items-center justify-center bg-zinc-950 text-zinc-100"
    >
      <div class="w-full max-w-md rounded-2xl border border-zinc-100 p-8">
        <h1 class="text-center text-2xl font-bold">Login</h1>
        <form action="" class="">
          <div class="mb-3">
            <label class="text-sm block text-zinc-200 mb-1" for="Email"
              >Email</label
            >
            <input
              class="border border-zinc-400 w-full px-4 py-2 rounded-lg focus:outline-none"
              type="email"
              placeholder="Enter your email"
            />
          </div>
          <div>
            <label class="text-sm block text-zinc-200 mb-1" for="Password"
              >Password</label
            >
            <input
              class="border border-zinc-400 w-full px-4 py-2 rounded-lg focus:outline-none"
              type="password"
              placeholder="********"
            />
          </div>
          <button
            class="w-full bg-amber-500 py-2 mt-4 rounded-sm hover:bg-amber-600 transition-all"
          >
            Login
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
